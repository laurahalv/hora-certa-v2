spring.application.name=back

# CONFIGURAÇÃO DO BANCO DE DADOS H2 (PERSISTENTE EM ARQUIVO)
spring.datasource.url=jdbc:h2:file:./data/horacertadb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Mantém a estratégia de atualizar a estrutura sem apagar os dados antigos
spring.jpa.hibernate.ddl-auto=update

# Ativa o console web
spring.h2.console.enabled=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

