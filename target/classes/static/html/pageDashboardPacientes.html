<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/pageDashboardPacientes.css" />
    <script defer src="../../js/pageDashboardPacientes.js"></script>
    <title>Dashboard | Pacientes</title>
  </head>
  <body>
    <header>
      <div class="header-introduce">
        <div class="header-logo">
          <img src="../img/icon_convertido.svg" alt="Logo Hora Certa" />
        </div>

        <div class="title">
          <h1>Hora Certa</h1>
        </div>
      </div>

      <div class="header-links">
        <a href="pageDashboardClinicas.html" class="header-link">Dashboard</a>
        <a href="#" class="header-link">Pacientes</a>
        <a href="pageDashboardMedicos.html" class="header-link">Médicos</a>
        <a href="pageDashboardConvites.html" class="header-link">Convites</a>
        <a href="pageDashboardConfig.html" class="header-link">Configurações</a>
      </div>
    </header>

    <main class="dashboard-container">
      <section class="dashboard">
        <h2>Pacientes</h2>
        <div class="addPaciente">
          <p>Gerencie os pacientes cadastrados na clínica e faça a atribuição de médicos</p>
          <button type="button" class="btn">Adicionar Paciente</button>
        </div>
      </section>

      <div class="searchInput">
        <input type="text" id="inputPesquisa" placeholder="Pesquisar por nome, e-mail ou CPF..." />
        <select name="medico" id="filtroMedico">
          <option value="">Todos os médicos</option>
          </select>
      </div>

      <div id="tela-lista">
        <div class="cards-container">
          </div>
      </div>

      <div id="tela-detalhe" style="display: none"></div>
    </main>

    <footer>
      <p>&copy; 2026 Hora Certa. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
