<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/pagesCreateLogins.css">
    <title>Cadastro de Clínicas</title>
    
</head>
<body>
    <main class="container">
        <section class="container-image">
            <div class="logo-image">
                <img src="../img/icon_convertido.svg" alt="Logo Hora Certa" />
            </div>
            <h1>Hora Certa!</h1>
        </section>
        <section class="container-form">
            <h1>Cadastro Clínica!</h1>
            <label for="nome-clinica">Nome da Clínica:</label>
            <input type="text" id="nome-clinica" name="nome-clinica" placeholder="Digite o nome da clínica" required>

            <label for="cnpj-clinica">CNPJ da Clínica:</label>
            <input type="text" id="cnpj-clinica" name="cnpj-clinica" placeholder="Digite o CNPJ da clínica" required>

            <label for="email-clinica">Email da Clínica:</label>
            <input type="email" id="email-clinica" name="email-clinica" placeholder="Digite o email da clínica" required>

            <label for="senha-clinica">Senha:</label>
            <input type="password" id="senha-clinica" name="senha-clinica" placeholder="Digite a senha" required>
            
            <button class="btnLogins btnCriar-Clinicas">Criar Conta</button>
        </section>
    </main>
    
</body>
</html>
