<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/pageDashboardConfig.css" />
    <script defer src="../../js/pageDashboardConfig.js"></script>
    <title>Dashboard | Config</title>
  </head>
  <body>
    <header>
      <div class="header-introduce">
        <div class="header-logo">
          <img src="../img/icon_convertido.svg" alt="Logo Hora Certa" />
        </div>

        <div class="title">
          <h1>Hora Certa</h1>
        </div>
      </div>

      <div class="header-links">
        <a href="pageDashboardClinicas.html" class="header-link">Dashboard</a>
        <a href="pageDashboardPacientes.html" class="header-link">Pacientes</a>
        <a href="pageDashboardMedicos.html" class="header-link">Médicos</a>
        <a href="pageDashboardConvites.html" class="header-link">Convites</a>
        <a href="#" class="header-link">Configurações</a>
      </div>
    </header>
    <main class="container">
      <section class="dashboard">
        <h2>Configurações</h2>
      </section>
      <section class="container-form-cnpj">
        <form class="form-cnpj">
          <h3>Configurações da Clínica</h3>
          <label for="nome">Nome da Clínica:</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite o nome da clínica"
            required
          />
          <label for="cnpj">CNPJ da Clínica:</label>
          <input
            type="text"
            id="cnpj"
            name="cnpj"
            placeholder="Digite o CNPJ da clínica"
            required
          />
          <label for="endereco">Endereço da Clínica:</label>
          <input
            type="text"
            id="endereco"
            name="endereco"
            placeholder="Rua, Número, Bairro"
            required
          />
          <button type="submit">Salvar</button>
        </form>
      </section>

      <section class="container-form-perfil">
        <form class="form-perfil">
          <h3>Configurações do Perfil</h3>
          <label for="nome">Nome Completo:</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite o nome completo"
            required
          />
          <label for="email">E-mail de Contato:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Digite o e-mail de contato"
            required
          />
          <label for="telefone">Telefone de Contato:</label>
          <input
            type="tel"
            id="telefone"
            name="telefone"
            placeholder="Digite o telefone de contato"
            required
          />
          <button type="submit">Salvar</button>
        </form>
      </section>

      <section class="container-form-seguranca">
        <form class="form-seguranca">
          <h3>Configurações de Segurança</h3>
          <label for="senha-atual">Senha Atual:</label>
          <input
            type="password"
            id="senha-atual"
            name="senha-atual"
            placeholder="Digite a senha atual"
            required
          />
          <label for="nova-senha">Nova Senha:</label>
          <input
            type="password"
            id="nova-senha"
            name="nova-senha"
            placeholder="Digite a nova senha"
            required
          />
          <label for="confirmar-senha">Confirmar Nova Senha:</label>
          <input
            type="password"
            id="confirmar-senha"
            name="confirmar-senha"
            placeholder="Confirme a nova senha"
            required
          />
          <button type="submit">Salvar</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Hora Certa. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
