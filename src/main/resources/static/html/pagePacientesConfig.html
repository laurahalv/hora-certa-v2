<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/pagePacientesConfig.css" />
    <script defer src="../../js/pagePacientesConfig.js"></script>
    <title>Pacientes | Config</title>
  </head>
  <body>
    <header>
      <div class="header-introduce">
        <div class="header-logo">
          <img src="../img/icon_convertido.svg" class="logo" alt="Logo Hora Certa" />
        </div>

        <div class="title">
          <h1>Hora Certa</h1>
        </div>
      </div>

      <div class="header-links">
        <a href="pagePacientesHome.html" class="header-link">Dashboard</a>
        <a href="#" class="header-link">Configurações</a>
      </div>
    </header>

    <main class="container">
      <section class="dashboard">
        <h2>Configurações de <span id="loggedPacienteNome">Paciente</span></h2>
      </section>
      
      <section class="container-form-DataPaciente">
        <form class="form-DataPaciente">
          <h3>Configurações do Paciente</h3>
          <label for="nome">Nome do Paciente:</label>
          <input
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite o Nome Completo"
            required
          />
          <label for="cpf">CPF do Paciente:</label>
          <input
            type="text"
            id="cpf"
            name="cpf"
            placeholder="Digite o CPF do paciente"
            required
          />
          <label for="email">Email do Paciente:</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Digite o Email do Paciente"
            required
          />
          <label for="telefone">Telefone:</label>
          <input
            type="tel"
            id="telefone"
            name="telefone"
            placeholder="Digite o Telefone do Paciente"
            required
          />
          <label for="endereco">Endereço do Paciente:</label>
          <input
            type="text"
            id="endereco"
            name="endereco"
            placeholder="Rua, Número, Bairro"
            required
          />
          <button type="submit">Salvar</button>
        </form>
      </section>

      <section class="container-form-notificacao">
        <form class="form-notificacao">
          <h3>Notificações</h3>
          <div class="item-notificacao">
            <div class="texto">
              <h4>Notificações por Email</h4>
            </div>

            <label class="switch">
              <input id="notificacao-email" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="item-notificacao">
            <div class="texto">
              <h4>Notificações Push</h4>
            </div>

            <label class="switch">
              <input id="notificacao-push" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>

          <div class="item-notificacao">
            <div class="texto">
              <h4>Lembrete Antecipado</h4>
            </div>

            <label class="switch">
              <input id="lembrete-antecipado" type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
          <button type="submit">Salvar</button>
        </form>
      </section>

      <section class="container-form-seguranca">
        <form class="form-seguranca">
          <h3>Configurações de Segurança</h3>
          <label for="senha-atual">Senha Atual:</label>
          <input
            type="password"
            id="senha-atual"
            name="senha-atual"
            placeholder="Digite a senha atual"
            required
          />
          <label for="nova-senha">Nova Senha:</label>
          <input
            type="password"
            id="nova-senha"
            name="nova-senha"
            placeholder="Digite a nova senha"
            required
          />
          <label for="confirmar-senha">Confirmar Nova Senha:</label>
          <input
            type="password"
            id="confirmar-senha"
            name="confirmar-senha"
            placeholder="Confirme a nova senha"
            required
          />
          <button type="submit">Salvar</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Hora Certa. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
