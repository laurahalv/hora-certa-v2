<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/pageMedicosHome.css" />
    <title>Medicos | Home</title>
    <script defer src="../../js/pageMedicosHome.js"></script>
  </head>
  <body>
    <header>
      <div class="header-introduce">
        <div class="header-logo">
          <img
            src="../img/icon_convertido.svg"
            class="logo"
            alt="Logo Hora Certa"
          />
        </div>

        <div class="title">
          <h1>Hora Certa</h1>
        </div>
      </div>

      <div class="header-perfil">
        <div class="perfil-info">
          <p id="loggedMedicoNome">Carregando...</p>
        </div>
        <div class="perfil-image">
          <img
            src="../img/pageMedicoHomeProfile.png"
            alt="Foto de Perfil do Médico"
          />
        </div>
      </div>
    </header>

    <main class="dashboard-container">
      <section class="dashboard">
        <h2>Pacientes</h2>
        <div class="addPaciente">
          <p>Gerencie os pacientes cadastrados na clínica</p>
          <button type="button" class="btn">Adicionar Pacientes</button>
        </div>
      </section>

      <div class="searchInput">
        <input type="text" placeholder="Pesquisar nome ou email..." />
      </div>

      <div class="tab-list"></div>

      <div id="tela-lista">
        <div class="cards-container"></div>
      </div>

      <div id="tela-detalhe" style="display: none">
        <!-- 
          Detalhes do paciente com medicamentos serão renderizados aqui pelo JavaScript.
          Inclui:
          - Informações pessoais do paciente (nome, email, telefone, médico responsável)
          - Resumo: adesão ao tratamento, tratamentos ativos, próxima consulta
          - Seção de medicamentos em uso com dose, frequência e período de tratamento
          - Informações de adesão para cada medicamento
        -->
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Hora Certa. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
