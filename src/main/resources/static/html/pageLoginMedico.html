<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/pageLoginMedico.css" />
    <title>Login Médico</title>
  </head>
  <body>
    <main class="container">
      <section class="container-image">
        <div class="logo-image">
          <img src="../img/icon_convertido.svg" alt="Logo Hora Certa" />
        </div>
        <h1>Hora Certa!</h1>
      </section>
      <section class="container-form">
        <h1>Login Médico</h1>
        <label for="email-medico">Email:</label>
        <input
          type="email"
          id="email-medico"
          name="email-medico"
          placeholder="Digite seu email"
          required
        />

        <label for="senha-medico">Senha:</label>
        <input
          type="password"
          id="senha-medico"
          name="senha-medico"
          placeholder="Digite sua senha"
          required
        />

        <button class="btnLogins" type="button">
          Entrar
        </button>
      </section>
    </main>

    <script>
        document
        .querySelector(".btnLogins")
        .addEventListener("click", async function () {
          const email = document.getElementById("email-medico").value.trim();
          const senha = document.getElementById("senha-medico").value.trim();

          if (!email || !senha) {
            alert("Por favor, preencha todos os campos");
            return;
          }

          try {
            const response = await fetch("http://localhost:8080/api/medicos", {
              method: "GET",
              headers: {
                "Content-Type": "application/json",
              },
            });

            if (response.ok) {
              const clinicas = await response.json();

              // Procurar pelo médico com email e senha corretos
              const medicoLogado = clinicas.find(
                (medico) => medico.email === email && medico.senha === senha,
              );

              if (medicoLogado) {
                // Salvar informações no localStorage
                localStorage.setItem("medicoId", medicoLogado.id);
                localStorage.setItem("medicoNome", medicoLogado.nome);
                localStorage.setItem("medicoEmail", medicoLogado.email);
                localStorage.setItem("isMedicoLogado", "true");

                alert("Login realizado com sucesso!");
                window.location.href = "./pageMedicosHome.html";
              } else {
                alert("Email ou senha incorretos");
              }
            } else {
              alert("Erro ao fazer login. Tente novamente.");
            }
          } catch (error) {
            console.error("Erro:", error);
            alert("Erro na requisição: " + error.message);
          }
        });
    </script>
  </body>
</html>
