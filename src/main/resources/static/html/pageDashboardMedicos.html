<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/pageMedicos.css" />
    <script defer src="../../js/pageMedicos.js"></script>
    <title>Dashboard | Pacientes</title>
  </head>
  <body>
    <header>
      <div class="header-introduce">
        <div class="header-logo">
          <img src="../img/icon_convertido.svg" alt="Logo Hora Certa" />
        </div>

        <div class="title">
          <h1>Hora Certa</h1>
        </div>
      </div>

      <div class="header-links">
        <a href="#" class="header-link">Dashboard</a>
        <a href="#" class="header-link">Pacientes</a>
        <a href="#" class="header-link">Médicos</a>
        <a href="#" class="header-link">Convites</a>
        <a href="#" class="header-link">Configurações</a>
      </div>
    </header>

    <main class="dashboard-container">
      <section class="dashboard">
        <h2>Médicos</h2>
        <div class="addMedico">
          <p>Gerencie os médicos cadastrados na clínica</p>
          <button type="submit" class="btn">Adicionar Médicos</button>
        </div>
      </section>

      <!-- Input de pesquisa  -->
      <div class="searchInput">
        <input type="text" placeholder="Pesquisar médicos..." />
        <select name="medico" id="filtroMedico">
          <option value="">Todos os médicos</option>
          <option value="1">Dr. João</option>
          <option value="2">Dra. Maria</option>
          <option value="3">Dr. Pedro</option>
          <option value="4">Dra. Ana</option>
        </select>
      </div>

      <div id="tela-lista">
        <div class="cards-container">
          <!-- Cards de pacientes serão renderizados aqui via JavaScript -->
        </div>
      </div>
      <!-- Card de paciente  -->

      <div id="tela-detalhe" style="display: none"></div>
    </main>

    <footer>
      <p>&copy; 2026 Hora Certa. Todos os direitos reservados.</p>
    </footer>
  </body>
</html>
